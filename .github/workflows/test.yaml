name:test project 

on:
  pull_request :
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.8
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest 